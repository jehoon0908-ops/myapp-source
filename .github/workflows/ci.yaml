name: ci-harbor

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # 🔐 Harbor 로그인
      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.HARBOR_REGISTRY }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # 📦 이미지 이름 설정
      - name: Set image vars
        id: vars
        run: |
          IMAGE=${{ secrets.HARBOR_REGISTRY }}/myapp/myapp
          TAG=sha-${GITHUB_SHA}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      # 🐳 Docker build + push
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

      # 📂 manifests repo 가져오기
      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: jehoon0908-ops/myapp-manifests
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          path: manifests

      # 🔄 deployment.yaml 이미지 변경
      - name: Update deployment image
        run: |
          IMAGE=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          sed -i "s|image: .*|image: ${IMAGE}|g" manifests/deployment.yaml

      # 🚀 Git push (Argo CD 트리거)
      - name: Commit and push
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ steps.vars.outputs.tag }}" || exit 0
          git push
