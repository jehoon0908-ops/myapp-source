name: ci

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-update-manifests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image variables
        id: vars
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/myapp
          IMAGE=$(echo "$IMAGE" | tr '[:upper:]' '[:lower:]')
          TAG=sha-${GITHUB_SHA}
          echo "image=$IMAGE" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}

      - name: Checkout manifests repo
        uses: actions/checkout@v4
        with:
          repository: jehoon0908-ops/myapp-manifests
          token: ${{ secrets.MANIFESTS_REPO_TOKEN }}
          path: manifests

      - name: Update deployment image
        run: |
          IMAGE=${{ steps.vars.outputs.image }}:${{ steps.vars.outputs.tag }}
          sed -i "s|image: .*|image: ${IMAGE}|g" manifests/deployment.yaml

      - name: Commit and push manifests
        run: |
          cd manifests
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ steps.vars.outputs.tag }}" || exit 0
          git push
